<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: black;
        }

        .container {
            width: 350px;
            padding: 30px;
            text-align: center;
            border: 2px solid black;
            border-radius: 12px;
            background-color: white;
        }

        h2 { margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid black;
            border-radius: 4px;
            box-sizing: border-box; /* Ensures padding doesn't break width */
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover { background-color: #0000cd; }

        .toggle-link {
            margin-top: 20px;
            font-size: 0.85em;
            cursor: pointer;
            text-decoration: underline;
            color: #333;
        }

        .hidden { display: none; }
        
        #message {
            margin-top: 15px;
            font-weight: bold;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-form">
            <h2>Login</h2>
            <input type="text" id="login-user" placeholder="Username">
            <input type="password" id="login-pass" placeholder="Password">
            <button onclick="submitData('login')">Login</button>
            <p class="toggle-link" onclick="toggleForm('register-form', 'login-form')">Need an account? Register</p>
        </div>

        <div id="register-form" class="hidden">
            <h2>Register</h2>
            <input type="text" id="reg-user" placeholder="Username">
            <input type="password" id="reg-pass" placeholder="Password">
            <button onclick="submitData('register')">Create Account</button>
            <p class="toggle-link" onclick="toggleForm('login-form', 'register-form')">Have an account? Login</p>
        </div>
        
        <div id="message"></div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw6hXwKHz_uiVKW6vLRnFf5y8ex_OryExi6LQdbwzB1levGXskaEOWzhUHUfNiDyUic/exec';

        function toggleForm(showId, hideId) {
            document.getElementById(showId).classList.remove('hidden');
            document.getElementById(hideId).classList.add('hidden');
            document.getElementById('message').innerText = "";
        }

        function submitData(action) {
            const msgDiv = document.getElementById('message');
            const user = action === 'login' ? document.getElementById('login-user').value : document.getElementById('reg-user').value;
            const pass = action === 'login' ? document.getElementById('login-pass').value : document.getElementById('reg-pass').value;

            if (!user || !pass) {
                msgDiv.style.color = "red";
                msgDiv.innerText = "Fields cannot be empty!";
                return;
            }

            msgDiv.style.color = "blue";
            msgDiv.innerText = "Processing...";

            // Using Form Data to bypass some CORS restrictions with Google Apps Script
            const formData = new FormData();
            formData.append('action', action);
            formData.append('username', user);
            formData.append('password', pass);

            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify({ action: action, username: user, password: pass })
            })
            .then(res => res.text())
            .then(response => {
                if (response === "success") {
                    msgDiv.style.color = "green";
                    msgDiv.innerText = "Login Successful! Redirecting...";
                    // REPLACE THE URL BELOW WITH YOUR MAIN PAGE
                    setTimeout(() => { window.location.href = "https://www.google.com"; }, 1500);
                } else if (response === "registered") {
                    msgDiv.style.color = "green";
                    msgDiv.innerText = "Registration complete! You can now login.";
                    toggleForm('login-form', 'register-form');
                } else if (response === "exists") {
                    msgDiv.style.color = "red";
                    msgDiv.innerText = "Username already taken.";
                } else {
                    msgDiv.style.color = "red";
                    msgDiv.innerText = "Invalid Username or Password.";
                }
            })
            .catch(error => {
                // Because of how Google Apps Script handles CORS, sometimes the data 
                // is sent successfully even if an 'error' is caught here.
                msgDiv.style.color = "black";
                msgDiv.innerText = "Check your Google Sheet to confirm!";
                console.error('Error!', error.message);
            });
        }
    </script>

</body>
</html>
