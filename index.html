<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Login</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: white; font-family: 'Segoe UI', sans-serif; color: black; }
        .container { width: 320px; padding: 30px; border: 2px solid black; border-radius: 12px; text-align: center; box-shadow: 5px 5px 0px black; }
        h2 { text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid black; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: blue; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; transition: 0.2s; }
        button:active { transform: scale(0.98); background-color: darkblue; }
        .toggle { margin-top: 20px; font-size: 0.85em; cursor: pointer; text-decoration: underline; font-weight: bold; }
        .hidden { display: none; }
        #status { margin-top: 20px; font-weight: bold; min-height: 24px; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-box">
            <h2>Login</h2>
            <input type="text" id="l-user" placeholder="Username">
            <input type="password" id="l-pass" placeholder="Password">
            <button onclick="sendData('login')">LOGIN</button>
            <p class="toggle" onclick="swap()">Need an account? Register</p>
        </div>

        <div id="reg-box" class="hidden">
            <h2>Register</h2>
            <input type="text" id="r-user" placeholder="Username">
            <input type="password" id="r-pass" placeholder="Password">
            <button onclick="sendData('register')">CREATE ACCOUNT</button>
            <p class="toggle" onclick="swap()">Have an account? Login</p>
        </div>

        <div id="status"></div>
    </div>

    <script>
        const URL = 'https://script.google.com/macros/s/AKfycbw6hXwKHz_uiVKW6vLRnFf5y8ex_OryExi6LQdbwzB1levGXskaEOWzhUHUfNiDyUic/exec';
        const dashboardURL = 'https://emalawi.github.io/School-/Maindashboard';

        function swap() {
            document.getElementById('login-box').classList.toggle('hidden');
            document.getElementById('reg-box').classList.toggle('hidden');
            document.getElementById('status').innerText = "";
        }

        function sendData(type) {
            const user = type === 'login' ? document.getElementById('l-user').value : document.getElementById('r-user').value;
            const pass = type === 'login' ? document.getElementById('l-pass').value : document.getElementById('r-pass').value;
            const status = document.getElementById('status');

            if(!user || !pass) { 
                status.style.color = "red";
                status.innerText = "Error: Fill all fields!"; 
                return; 
            }
            
            status.style.color = "blue";
            status.innerText = "Processing... Please wait.";

            fetch(URL, {
                method: 'POST',
                mode: 'no-cors', 
                cache: 'no-cache',
                body: JSON.stringify({ action: type, username: user, password: pass })
            }).then(() => {
                // VISUAL FEEDBACK ON THE PAGE
                status.style.color = "green";
                status.innerText = (type === 'login' ? "Login Successful!" : "Registration Complete!") + " Redirecting...";
                
                // THE REDIRECT
                setTimeout(() => {
                    window.location.href = dashboardURL;
                }, 1500); 

            }).catch(e => {
                status.style.color = "red";
                status.innerText = "Connection error. Try again.";
            });
        }
    </script>
</body>
</html>
