<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Library - Search & Download</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #4CAF50;
            --danger: #f44336;
            --warning: #ff9800;
            --light: #f8f9fa;
            --dark: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Header */
        .header {
            background: white;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            animation: slideDown 0.6s ease-out;
        }

        .header-banner {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 80px;
            animation: fadeIn 0.8s ease-out;
            position: relative;
        }

        .header-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(102, 126, 234, 0.7);
            border-radius: 10px;
        }

        .header-banner-content {
            position: relative;
            z-index: 2;
        }

        h1 {
            color: var(--dark);
            margin: 20px 0 10px;
            font-size: 2.5em;
            animation: slideUp 0.6s ease-out 0.2s both;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
            animation: slideUp 0.6s ease-out 0.4s both;
        }

        /* Online Users Counter */
        .online-counter {
            background: white;
            padding: 15px 25px;
            border-radius: 25px;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.6s ease-out 0.3s both;
        }

        .online-counter-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            background: #4CAF50;
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .online-count {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
        }

        .online-label {
            font-size: 14px;
            color: #666;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            animation: slideUp 0.6s ease-out 0.6s both;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: var(--primary);
            animation: countUp 2s ease-out;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Search Section */
        .search-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            animation: slideUp 0.6s ease-out 0.8s both;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input[type="text"], select {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        /* Loading & Error */
        .loading {
            text-align: center;
            color: var(--primary);
            font-weight: 600;
            display: none;
            margin: 40px 0;
            font-size: 18px;
        }

        .loading.show {
            display: block;
            animation: pulse 1.5s infinite;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 4px solid rgba(102, 126, 234, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #c33;
            animation: slideDown 0.3s ease-out;
        }

        .error.show {
            display: block;
        }

        /* PDF Grid */
        .pdf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
            animation: fadeIn 0.6s ease-out;
        }

        .pdf-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            animation: scaleIn 0.5s ease-out;
            display: flex;
            flex-direction: column;
        }

        .pdf-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.25);
        }

        .pdf-icon {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
            position: relative;
        }

        .pdf-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .pdf-name {
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 10px;
            word-break: break-word;
            font-size: 16px;
            line-height: 1.3;
        }

        .pdf-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #999;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .pdf-size {
            background: var(--light);
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        /* Engagement Section */
        .engagement {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .engagement-item {
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            background: var(--light);
            transition: all 0.3s;
            cursor: pointer;
        }

        .engagement-item:hover {
            background: #e8eef7;
            transform: scale(1.05);
        }

        .engagement-number {
            font-weight: bold;
            color: var(--primary);
            font-size: 16px;
        }

        .engagement-label {
            font-size: 11px;
            color: #666;
        }

        /* Action Buttons */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .download-btn, .like-btn {
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .download-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .like-btn {
            background: white;
            border: 2px solid #e0e0e0;
            color: var(--dark);
        }

        .like-btn:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .like-btn.liked {
            background: #ffe0e0;
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Comments Section */
        .comments-section {
            background: var(--light);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .comment {
            background: white;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 12px;
            animation: slideIn 0.3s ease-out;
            border-left: 3px solid var(--primary);
        }

        .comment-user {
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .comment-text {
            color: #333;
            word-break: break-word;
        }

        .comment-input-section {
            display: flex;
            gap: 8px;
        }

        .comment-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 12px;
            font-family: inherit;
        }

        .comment-submit {
            padding: 8px 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .comment-submit:hover {
            background: var(--secondary);
        }

        /* No Results */
        .no-results {
            text-align: center;
            color: #999;
            padding: 60px 20px;
            font-size: 18px;
            animation: fadeIn 0.5s ease-out;
        }

        .no-results-icon {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Footer Stats */
        .stats {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 30px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.6s ease-out;
        }

        /* Animations */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes countUp {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .pdf-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 15px;
            }

            .search-box {
                flex-direction: column;
            }

            input[type="text"], select {
                min-width: 100%;
            }

            button {
                width: 100%;
            }

            .engagement {
                grid-template-columns: repeat(3, 1fr);
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 20px 15px;
            }

            h1 {
                font-size: 1.5em;
            }

            .header-banner {
                height: 150px;
            }

            .pdf-grid {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                grid-template-columns: 1fr;
            }

            .online-counter {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-banner">
            <div class="header-banner-content">📚</div>
        </div>
        <h1>📖 PDF Library Hub</h1>
        <p class="subtitle">Search, Download & Share Educational Resources</p>
        
        <!-- Online Users Counter - Real Time -->
        <div class="online-counter">
            <div class="online-counter-content">
                <div class="online-dot"></div>
                <div>
                    <div class="online-count" id="onlineCount">0</div>
                    <div class="online-label">Real Online Users</div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-number" id="totalPdfs">0</div>
                <div class="stat-label">Total PDFs</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalDownloads">0</div>
                <div class="stat-label">Total Downloads</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalLikes">0</div>
                <div class="stat-label">Total Likes</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalComments">0</div>
                <div class="stat-label">Total Comments</div>
            </div>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="🔍 Search PDFs by name or subject..."
                    autocomplete="off"
                >
                <select id="sortBy">
                    <option value="name">Sort by Name</option>
                    <option value="downloads">Most Downloaded</option>
                    <option value="likes">Most Liked</option>
                    <option value="comments">Most Commented</option>
                </select>
                <button onclick="loadPDFs()">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
        </div>

        <div class="loading" id="loading">
            <span class="spinner"></span> Loading PDFs...
        </div>
        <div class="error" id="error"></div>
        <div class="pdf-grid" id="pdfGrid"></div>
        <div class="no-results" id="noResults" style="display: none;">
            <div class="no-results-icon">📭</div>
            <div>No PDFs found. Try a different search.</div>
        </div>
        <div class="stats" id="stats"></div>
    </div>

    <script>
        const GITHUB_OWNER = 'emalawi';
        const GITHUB_REPO = 'School-';
        const PDFS_FOLDER = 'emalawi19';
        
        // JSONBin.io Configuration (Free backend for real online users)
        // You need to create a free account at jsonbin.io and replace these with your own
        const JSONBIN_BIN_ID = 'YOUR_BIN_ID'; // Replace with your bin ID
        const JSONBIN_API_KEY = 'YOUR_API_KEY'; // Replace with your API key
        
        let allPDFs = [];
        let pdfStats = {};
        let sessionId = null;
        let heartbeatInterval = null;
        
        // Generate unique session ID
        function generateSessionId() {
            return 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }
        
        // Get or create session ID
        function getSessionId() {
            let id = localStorage.getItem('pdfSessionId');
            if (!id) {
                id = generateSessionId();
                localStorage.setItem('pdfSessionId', id);
            }
            return id;
        }
        
        // Update real online users count
        async function updateOnlineUsers() {
            try {
                const sessionId = getSessionId();
                
                // Get current online users data
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: {
                        'X-Master-Key': JSONBIN_API_KEY
                    }
                });
                
                const data = await response.json();
                let onlineData = data.record || { users: {}, lastCleanup: Date.now() };
                
                // Clean up old sessions (older than 30 seconds)
                const now = Date.now();
                if (now - (onlineData.lastCleanup || 0) > 10000) { // Clean every 10 seconds
                    const activeUsers = {};
                    for (const [id, timestamp] of Object.entries(onlineData.users)) {
                        if (now - timestamp < 30000) { // 30 seconds timeout
                            activeUsers[id] = timestamp;
                        }
                    }
                    onlineData.users = activeUsers;
                    onlineData.lastCleanup = now;
                }
                
                // Add or update current session
                onlineData.users[sessionId] = now;
                const onlineCount = Object.keys(onlineData.users).length;
                
                // Update the counter display
                document.getElementById('onlineCount').textContent = onlineCount;
                
                // Save back to JSONBin
                await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify(onlineData)
                });
                
                return onlineCount;
            } catch (error) {
                console.error('Error updating online users:', error);
                // Fallback to localStorage if API fails
                const fallbackCount = getFallbackOnlineCount();
                document.getElementById('onlineCount').textContent = fallbackCount;
                return fallbackCount;
            }
        }
        
        // Fallback method using localStorage
        function getFallbackOnlineCount() {
            let count = localStorage.getItem('fallbackOnlineCount');
            if (!count) {
                count = '1';
                localStorage.setItem('fallbackOnlineCount', count);
            }
            return count;
        }
        
        // Start heartbeat to keep session alive
        function startHeartbeat() {
            // Update immediately
            updateOnlineUsers();
            
            // Update every 15 seconds
            heartbeatInterval = setInterval(() => {
                updateOnlineUsers();
            }, 15000);
        }
        
        // Clean up on page unload
        function cleanupSession() {
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
            }
        }
        
        // Load stats from localStorage
        function loadStatsFromStorage() {
            const stored = localStorage.getItem('pdfStats');
            if (stored) {
                pdfStats = JSON.parse(stored);
            } else {
                pdfStats = {};
            }
        }
        
        // Save stats to localStorage
        function saveStatsToStorage() {
            localStorage.setItem('pdfStats', JSON.stringify(pdfStats));
        }
        
        // Load PDFs from GitHub
        async function loadPDFs() {
            const loading = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const pdfGrid = document.getElementById('pdfGrid');
            const noResults = document.getElementById('noResults');
            
            loading.classList.add('show');
            errorDiv.classList.remove('show');
            pdfGrid.innerHTML = '';
            noResults.style.display = 'none';
            
            try {
                const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                const sortBy = document.getElementById('sortBy').value;
                
                // Fetch PDF files from GitHub API
                const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${PDFS_FOLDER}`);
                
                if (!response.ok) {
                    throw new Error('Failed to load PDFs from repository');
                }
                
                const files = await response.json();
                const pdfFiles = files.filter(file => file.name.toLowerCase().endsWith('.pdf'));
                
                allPDFs = pdfFiles.map(file => {
                    const stats = pdfStats[file.name] || { downloads: 0, likes: 0, comments: [] };
                    return {
                        name: file.name,
                        download_url: file.download_url,
                        size: file.size,
                        downloads: stats.downloads || 0,
                        likes: stats.likes || 0,
                        comments: stats.comments || []
                    };
                });
                
                // Apply search filter
                let filteredPDFs = allPDFs;
                if (searchTerm) {
                    filteredPDFs = allPDFs.filter(pdf => 
                        pdf.name.toLowerCase().includes(searchTerm)
                    );
                }
                
                // Apply sorting
                filteredPDFs.sort((a, b) => {
                    if (sortBy === 'name') {
                        return a.name.localeCompare(b.name);
                    } else if (sortBy === 'downloads') {
                        return b.downloads - a.downloads;
                    } else if (sortBy === 'likes') {
                        return b.likes - a.likes;
                    } else if (sortBy === 'comments') {
                        return b.comments.length - a.comments.length;
                    }
                    return 0;
                });
                
                // Update stats
                document.getElementById('totalPdfs').textContent = allPDFs.length;
                updateTotalStats();
                
                if (filteredPDFs.length === 0) {
                    noResults.style.display = 'block';
                } else {
                    displayPDFs(filteredPDFs);
                }
                
            } catch (error) {
                console.error('Error loading PDFs:', error);
                errorDiv.textContent = 'Error loading PDFs: ' + error.message;
                errorDiv.classList.add('show');
            } finally {
                loading.classList.remove('show');
            }
        }
        
        // Update total stats
        function updateTotalStats() {
            let totalDownloads = 0;
            let totalLikes = 0;
            let totalComments = 0;
            
            Object.values(pdfStats).forEach(stat => {
                totalDownloads += stat.downloads || 0;
                totalLikes += stat.likes || 0;
                totalComments += (stat.comments || []).length;
            });
            
            document.getElementById('totalDownloads').textContent = totalDownloads;
            document.getElementById('totalLikes').textContent = totalLikes;
            document.getElementById('totalComments').textContent = totalComments;
        }
        
        // Display PDFs in grid
        function displayPDFs(pdfs) {
            const pdfGrid = document.getElementById('pdfGrid');
            pdfGrid.innerHTML = '';
            
            pdfs.forEach((pdf, index) => {
                const card = document.createElement('div');
                card.className = 'pdf-card';
                card.style.animationDelay = `${index * 0.05}s`;
                
                const fileSize = (pdf.size / 1024).toFixed(2);
                
                card.innerHTML = `
                    <div class="pdf-icon">
                        <i class="fas fa-file-pdf"></i>
                    </div>
                    <div class="pdf-content">
                        <div class="pdf-name">${escapeHtml(pdf.name)}</div>
                        <div class="pdf-meta">
                            <span><i class="fas fa-file"></i> PDF</span>
                            <span class="pdf-size">${fileSize} KB</span>
                        </div>
                        <div class="engagement">
                            <div class="engagement-item">
                                <div class="engagement-number">${pdf.downloads}</div>
                                <div class="engagement-label">Downloads</div>
                            </div>
                            <div class="engagement-item">
                                <div class="engagement-number">${pdf.likes}</div>
                                <div class="engagement-label">Likes</div>
                            </div>
                            <div class="engagement-item">
                                <div class="engagement-number">${pdf.comments.length}</div>
                                <div class="engagement-label">Comments</div>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button class="download-btn" onclick="downloadPDF('${escapeHtml(pdf.name)}', '${escapeHtml(pdf.download_url)}')">
                                <i class="fas fa-download"></i> Download
                            </button>
                            <button class="like-btn" onclick="likePDF('${escapeHtml(pdf.name)}', this)">
                                <i class="fas fa-heart"></i> Like
                            </button>
                        </div>
                        <div class="comments-section" id="comments-${index}">
                            ${pdf.comments.map(comment => `
                                <div class="comment">
                                    <div class="comment-user">👤 User</div>
                                    <div class="comment-text">${escapeHtml(comment.text)}</div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="comment-input-section">
                            <input type="text" class="comment-input" id="comment-input-${index}" placeholder="Add a comment..." maxlength="200">
                            <button class="comment-submit" onclick="addComment('${escapeHtml(pdf.name)}', ${index})">
                                Post
                            </button>
                        </div>
                    </div>
                `;
                
                pdfGrid.appendChild(card);
            });
        }
        
        // Download PDF
        async function downloadPDF(pdfName, downloadUrl) {
            try {
                // Update download count
                if (!pdfStats[pdfName]) {
                    pdfStats[pdfName] = { downloads: 0, likes: 0, comments: [] };
                }
                pdfStats[pdfName].downloads++;
                saveStatsToStorage();
                updateTotalStats();
                
                // Trigger download
                const link = document.createElement('a');
                link.href = downloadUrl;
                link.download = pdfName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                // Refresh display
                loadPDFs();
            } catch (error) {
                console.error('Error downloading PDF:', error);
                alert('Error downloading PDF. Please try again.');
            }
        }
        
        // Like PDF
        function likePDF(pdfName, button) {
            if (!pdfStats[pdfName]) {
                pdfStats[pdfName] = { downloads: 0, likes: 0, comments: [] };
            }
            
            pdfStats[pdfName].likes++;
            saveStatsToStorage();
            updateTotalStats();
            
            // Visual feedback
            button.classList.add('liked');
            setTimeout(() => {
                button.classList.remove('liked');
            }, 300);
            
            // Refresh display
            loadPDFs();
        }
        
        // Add comment
        function addComment(pdfName, cardIndex) {
            const commentInput = document.getElementById(`comment-input-${cardIndex}`);
            const commentText = commentInput.value.trim();
            
            if (!commentText) {
                alert('Please enter a comment.');
                return;
            }
            
            if (!pdfStats[pdfName]) {
                pdfStats[pdfName] = { downloads: 0, likes: 0, comments: [] };
            }
            
            pdfStats[pdfName].comments.push({
                text: commentText,
                timestamp: Date.now()
            });
            
            saveStatsToStorage();
            updateTotalStats();
            commentInput.value = '';
            
            // Refresh display
            loadPDFs();
        }
        
        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Search functionality
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loadPDFs();
            }
        });
        
        // Initialize
        function init() {
            loadStatsFromStorage();
            loadPDFs();
            startHeartbeat();
            
            // Cleanup on page unload
            window.addEventListener('beforeunload', cleanupSession);
        }
        
        // Start the application
        init();
    </script>
</body>
</html>
