<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Library - Emalawi19</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    padding: 20px;
    color: #333;
}

h1 {
    text-align: center;
    color: white;
}

.container {
    max-width: 1000px;
    margin: auto;
}

.pdf-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin: 10px 0;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button {
    padding: 10px;
    border: none;
    background: #667eea;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #5a67d8;
}
</style>
</head>

<body>

<h1>📚 Emalawi19 PDF Library</h1>

<div class="container">
    <div id="pdfGrid">Loading PDFs...</div>
</div>

<script>
const GITHUB_OWNER = 'emalawi';
const GITHUB_REPO = 'School-';
const PDFS_FOLDER = 'emalawi19';

let db = null;

// ================= DATABASE =================
function initDatabase() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open('PDFLibraryDB', 1);

        request.onsuccess = e => {
            db = e.target.result;
            resolve(db);
        };

        request.onerror = e => reject(e.target.error);

        request.onupgradeneeded = e => {
            const db = e.target.result;
            const store = db.createObjectStore('pdfStats', { keyPath: 'pdfName' });
            store.createIndex('downloads', 'downloads');
        };
    });
}

async function getPDFStats(pdfName) {
    return new Promise(resolve => {
        if (!db) return resolve({ downloads: 0 });

        const tx = db.transaction(['pdfStats'], 'readonly');
        const store = tx.objectStore('pdfStats');
        const req = store.get(pdfName);

        req.onsuccess = () => resolve(req.result || { downloads: 0 });
        req.onerror = () => resolve({ downloads: 0 });
    });
}

async function savePDFStats(stats) {
    const tx = db.transaction(['pdfStats'], 'readwrite');
    const store = tx.objectStore('pdfStats');
    store.put(stats);
}

async function incrementDownload(pdfName) {
    const stats = await getPDFStats(pdfName);
    stats.pdfName = pdfName;
    stats.downloads = (stats.downloads || 0) + 1;
    await savePDFStats(stats);
}

// ================= PAYMENT SYSTEM (CONNECTED) =================
function downloadPDF(pdfName, downloadUrl) {

    const transId = prompt("💰 Pay MWK 50.00\n\nEnter Transaction ID:");

    if (!transId || transId.trim() === "") {
        alert("❌ Transaction ID required!");
        return;
    }

    alert("⏳ Verifying payment...");

    fetch("https://detailed-transmission-random-remains.trycloudflare.com/verify", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ transId: transId })
    })
    .then(res => res.json())
    .then(async data => {

        if (!data.success) {
            alert("❌ Invalid or unpaid Transaction ID");
            return;
        }

        alert("✅ Payment Verified!");

        await incrementDownload(pdfName);

        const link = document.createElement('a');
        link.href = downloadUrl;
        link.download = pdfName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        loadPDFs();
    })
    .catch(err => {
        alert("❌ Cannot connect to payment server");
        console.error(err);
    });
}

// ================= LOAD PDFs =================
async function loadPDFs() {
    const grid = document.getElementById('pdfGrid');
    grid.innerHTML = "Loading...";

    try {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${PDFS_FOLDER}`);
        const files = await res.json();

        const pdfs = files.filter(f => f.name.endsWith(".pdf"));

        const full = await Promise.all(pdfs.map(async f => {
            const stats = await getPDFStats(f.name);
            return {
                ...f,
                downloads: stats.downloads || 0
            };
        }));

        displayPDFs(full);

    } catch (err) {
        grid.innerHTML = "❌ Error loading PDFs";
    }
}

// ================= DISPLAY =================
function displayPDFs(pdfs) {
    const grid = document.getElementById('pdfGrid');
    grid.innerHTML = "";

    pdfs.forEach(pdf => {
        const div = document.createElement('div');
        div.className = "pdf-card";

        div.innerHTML = `
            <h3>${pdf.name}</h3>
            <p>Downloads: ${pdf.downloads}</p>
            <button onclick="downloadPDF('${pdf.name}', '${pdf.download_url}')">
                Download (MWK 50)
            </button>
        `;

        grid.appendChild(div);
    });
}

// ================= INIT =================
async function init() {
    await initDatabase();
    loadPDFs();
}

init();
</script>

</body>
</html>
