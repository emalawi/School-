<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Portal - Login</title>
    <style>
        /* Modern, Clean Centered Style */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: black;
        }

        .container {
            width: 330px;
            padding: 30px;
            border: 2px solid black;
            border-radius: 12px;
            text-align: center;
            box-shadow: 6px 6px 0px black; /* Sharp modern shadow */
        }

        h2 { margin-bottom: 20px; text-transform: uppercase; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1.5px solid black;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover { background-color: darkblue; }

        .toggle-btn {
            margin-top: 20px;
            font-size: 0.85em;
            cursor: pointer;
            text-decoration: underline;
        }

        .hidden { display: none; }

        #status {
            margin-top: 15px;
            font-weight: bold;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-box">
            <h2>Login</h2>
            <input type="text" id="l-user" placeholder="Username">
            <input type="password" id="l-pass" placeholder="Password">
            <button onclick="handleRequest('login')">LOGIN</button>
            <p class="toggle-btn" onclick="swap()">New user? Register here</p>
        </div>

        <div id="reg-box" class="hidden">
            <h2>Register</h2>
            <input type="text" id="r-user" placeholder="Username">
            <input type="password" id="r-pass" placeholder="Password">
            <button onclick="handleRequest('register')">CREATE ACCOUNT</button>
            <p class="toggle-btn" onclick="swap()">Back to Login</p>
        </div>

        <div id="status"></div>
    </div>

    <script>
        // YOUR LIVE URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyCejYq3ony-GIhJ6iYtVZj3dhjLYUg_C56fNhBLZcuJ_fgfgMbGJGcjkIaHeaY_UMkpw/exec';
        const DASHBOARD = 'https://emalawi.github.io/School-/Maindashboard';

        function swap() {
            document.getElementById('login-box').classList.toggle('hidden');
            document.getElementById('reg-box').classList.toggle('hidden');
            document.getElementById('status').innerText = "";
        }

        function handleRequest(mode) {
            const u = document.getElementById(mode === 'login' ? 'l-user' : 'r-user').value;
            const p = document.getElementById(mode === 'login' ? 'l-pass' : 'r-pass').value;
            const status = document.getElementById('status');

            if (!u || !p) {
                status.style.color = "red";
                status.innerText = "Error: Fill all fields!";
                return;
            }

            status.style.color = "blue";
            status.innerText = "Verifying...";

            // Create unique callback for this specific request
            const callbackName = 'cb_' + Math.floor(Math.random() * 1000000);
            
            window[callbackName] = function(data) {
                // Clean up the script tag and global function
                delete window[callbackName];
                
                if (data.result === "success") {
                    status.style.color = "green";
                    status.innerText = "Success! Entering Dashboard...";
                    setTimeout(() => { window.location.href = DASHBOARD; }, 1000);
                } else if (data.result === "registered") {
                    status.style.color = "green";
                    status.innerText = "Account Created! Please Login.";
                    swap();
                } else if (data.result === "exists") {
                    status.style.color = "red";
                    status.innerText = "Username already taken!";
                } else {
                    status.style.color = "red";
                    status.innerText = "Invalid Username or Password!";
                }
            };

            // Use Script Injection (JSONP) to bypass CORS
            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?action=${mode}&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}&callback=${callbackName}`;
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
