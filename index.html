<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login & Register</title>

    <style>
        body {
            background-color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            border: 1px solid #ddd;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
        }

        h2 {
            color: black;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 45%;
            padding: 10px;
            margin: 10px 5px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.8;
        }

        #message {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Login / Register</h2>

    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>

    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>

    <div id="message"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw7YsCEGVS7KXEiYI5YcXcAGMUFSdfPLolshoZM5Ix_w-8A_HmpUYMs0IPm5s69_E5W/exec";
const DASHBOARD_URL = "https://emalawi.github.io/School-/Maindashboard";

// LOGIN
async function login() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if (!username || !password) {
        showMessage("Fill all fields!", "red");
        return;
    }

    let response = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
            action: "login",
            username: username,
            password: password
        })
    });

    let result = await response.text();

    if (result === "success") {
        showMessage("Login successful!", "green");

        localStorage.setItem("user", username);

        setTimeout(() => {
            window.location.href = DASHBOARD_URL;
        }, 800);

    } else {
        showMessage("Invalid credentials!", "red");
    }
}

// REGISTER
async function register() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if (!username || !password) {
        showMessage("Fill all fields!", "red");
        return;
    }

    let response = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
            action: "register",
            username: username,
            password: password
        })
    });

    let result = await response.text();

    if (result === "registered") {
        showMessage("Registered successfully!", "green");

        localStorage.setItem("user", username);

        setTimeout(() => {
            window.location.href = DASHBOARD_URL;
        }, 800);

    } else if (result === "exists") {
        showMessage("Username already exists!", "red");
    }
}

// MESSAGE
function showMessage(msg, color) {
    let message = document.getElementById("message");
    message.style.color = color;
    message.innerText = msg;
}
</script>

</body>
</html>
