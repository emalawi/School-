<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register System</title>
    <style>
        /* General Page Styling */
        body {
            background-color: white;
            color: black;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            width: 320px;
            padding: 30px;
            border: 2px solid #eeeeee;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 {
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid black;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: darkblue;
        }

        .toggle-link {
            margin-top: 20px;
            font-size: 0.85em;
            cursor: pointer;
            color: blue;
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }

        /* Status message styling */
        #message {
            margin-top: 15px;
            font-size: 0.9em;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-form">
            <h2>Login</h2>
            <input type="text" id="login-user" placeholder="Username">
            <input type="password" id="login-pass" placeholder="Password">
            <button onclick="handleLogin()">LOGIN</button>
            <p class="toggle-link" onclick="toggleForms()">Don't have an account? Register</p>
        </div>

        <div id="register-form" class="hidden">
            <h2>Register</h2>
            <input type="text" id="reg-user" placeholder="Username">
            <input type="password" id="reg-pass" placeholder="Password">
            <button onclick="handleRegister()">REGISTER</button>
            <p class="toggle-link" onclick="toggleForms()">Already registered? Login</p>
        </div>

        <div id="message"></div>
    </div>

    <script>
        // Your specific Google Apps Script Web App URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxUTFWndFScFRaDv14vbkaVlN7DdEUyJPfozs9OFq_opc2ofJuiUhFBxshm9Dv5qnxGw/exec";

        function showMessage(text, color) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerText = text;
            msgDiv.style.color = color;
        }

        async function handleLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;

            if (!user || !pass) {
                return showMessage("Please fill in all fields", "red");
            }

            showMessage("Checking credentials...", "black");

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors", // Required for Google Scripts in some environments
                    body: JSON.stringify({ action: "login", username: user, password: pass })
                });

                // Since "no-cors" doesn't allow reading the body, 
                // we'll assume success if the browser doesn't throw an error, 
                // OR ideally, use a standard Fetch if your Script permits CORS.
                
                // Note: For a real app, you'd use result = await response.text();
                // But Google Apps Script CORS can be tricky.
                
                alert("Login request sent. If credentials are correct, check your redirect logic!");
                window.location.href = "https://www.google.com"; 

            } catch (error) {
                showMessage("Connection error", "red");
            }
        }

        async function handleRegister() {
            const user = document.getElementById('reg-user').value;
            const pass = document.getElementById('reg-pass').value;

            if (!user || !pass) {
                return showMessage("Please fill in all fields", "red");
            }

            showMessage("Registering...", "black");

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ action: "register", username: user, password: pass })
                });

                alert("Registration submitted! Try logging in now.");
                toggleForms();
            } catch (error) {
                showMessage("Registration error", "red");
            }
        }

        function toggleForms() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('register-form').classList.toggle('hidden');
            document.getElementById('message').innerText = "";
        }
    </script>
</body>
</html>
