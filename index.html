<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Library - Search & Download</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #4CAF50;
            --danger: #f44336;
            --warning: #ff9800;
            --light: #f8f9fa;
            --dark: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            background: white;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            animation: slideDown 0.6s ease-out;
        }

        .header-banner {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 80px;
            animation: fadeIn 0.8s ease-out;
            position: relative;
        }

        .header-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(102, 126, 234, 0.7);
            border-radius: 10px;
        }

        .header-banner-content {
            position: relative;
            z-index: 2;
        }

        h1 {
            color: var(--dark);
            margin: 20px 0 10px;
            font-size: 2.5em;
            animation: slideUp 0.6s ease-out 0.2s both;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
            animation: slideUp 0.6s ease-out 0.4s both;
        }

        .online-counter {
            background: white;
            padding: 15px 25px;
            border-radius: 25px;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.6s ease-out 0.3s both;
        }

        .online-counter-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            background: #4CAF50;
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .online-count {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
        }

        .online-label {
            font-size: 14px;
            color: #666;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            animation: slideUp 0.6s ease-out 0.6s both;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .search-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            animation: slideUp 0.6s ease-out 0.8s both;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input[type="text"], select {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .loading {
            text-align: center;
            color: var(--primary);
            font-weight: 600;
            display: none;
            margin: 40px 0;
            font-size: 18px;
        }

        .loading.show {
            display: block;
            animation: pulse 1.5s infinite;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 4px solid rgba(102, 126, 234, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #c33;
        }

        .error.show {
            display: block;
        }

        .pdf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .pdf-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        .pdf-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.25);
        }

        .pdf-icon {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
        }

        .pdf-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .pdf-name {
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 10px;
            word-break: break-word;
            font-size: 16px;
        }

        .pdf-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #999;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .pdf-size {
            background: var(--light);
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .engagement {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .engagement-item {
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            background: var(--light);
            transition: all 0.3s;
        }

        .engagement-number {
            font-weight: bold;
            color: var(--primary);
            font-size: 16px;
        }

        .engagement-label {
            font-size: 11px;
            color: #666;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .download-btn, .like-btn {
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .download-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
        }

        .like-btn {
            background: white;
            border: 2px solid #e0e0e0;
            color: var(--dark);
        }

        .like-btn:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .like-btn.liked {
            background: #ffe0e0;
            border-color: var(--danger);
            color: var(--danger);
        }

        .comments-section {
            background: var(--light);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .comment {
            background: white;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 12px;
            border-left: 3px solid var(--primary);
        }

        .comment-user {
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .comment-text {
            color: #333;
            word-break: break-word;
        }

        .comment-input-section {
            display: flex;
            gap: 8px;
        }

        .comment-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 12px;
        }

        .comment-submit {
            padding: 8px 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .no-results {
            text-align: center;
            color: #999;
            padding: 60px 20px;
            font-size: 18px;
            display: none;
        }

        .stats {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 30px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2em; }
            .pdf-grid { grid-template-columns: 1fr; }
            .search-box { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-banner">
            <div class="header-banner-content">📚</div>
        </div>
        <h1>📖 PDF Library Hub</h1>
        <p class="subtitle">Search, Download & Share Educational Resources</p>
        
        <div class="online-counter">
            <div class="online-counter-content">
                <div class="online-dot"></div>
                <div>
                    <div class="online-count" id="onlineCount">1</div>
                    <div class="online-label">Active Users</div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-number" id="totalPdfs">0</div>
                <div class="stat-label">Total PDFs</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalDownloads">0</div>
                <div class="stat-label">Total Downloads</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalLikes">0</div>
                <div class="stat-label">Total Likes</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalComments">0</div>
                <div class="stat-label">Total Comments</div>
            </div>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search PDFs by name or subject..." autocomplete="off">
                <select id="sortBy">
                    <option value="name">Sort by Name</option>
                    <option value="downloads">Most Downloaded</option>
                    <option value="likes">Most Liked</option>
                    <option value="comments">Most Commented</option>
                </select>
                <button onclick="loadPDFs()">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
        </div>

        <div class="loading" id="loading">
            <span class="spinner"></span> Loading PDFs...
        </div>
        <div class="error" id="error"></div>
        <div class="pdf-grid" id="pdfGrid"></div>
        <div class="no-results" id="noResults">
            <div class="no-results-icon">📭</div>
            <div>No PDFs found. Try a different search.</div>
        </div>
        <div class="stats" id="stats"></div>
    </div>

    <script>
        const GITHUB_OWNER = 'emalawi';
        const GITHUB_REPO = 'School-';
        const PDFS_FOLDER = 'emalawi19';
        
        let allPDFs = [];
        let db = null;
        
        // Initialize IndexedDB
        function initDatabase() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('PDFLibraryDB', 1);
                
                request.onerror = function(event) {
                    console.error('Database error:', event.target.error);
                    reject(event.target.error);
                };
                
                request.onsuccess = function(event) {
                    db = event.target.result;
                    console.log('Database opened successfully');
                    resolve(db);
                };
                
                request.onupgradeneeded = function(event) {
                    const db = event.target.result;
                    
                    // Create object store for PDF stats
                    if (!db.objectStoreNames.contains('pdfStats')) {
                        const store = db.createObjectStore('pdfStats', { keyPath: 'pdfName' });
                        store.createIndex('downloads', 'downloads', { unique: false });
                        store.createIndex('likes', 'likes', { unique: false });
                    }
                    
                    console.log('Database created/upgraded');
                };
            });
        }
        
        // Get stats for a PDF
        async function getPDFStats(pdfName) {
            return new Promise((resolve) => {
                if (!db) {
                    resolve({ pdfName: pdfName, downloads: 0, likes: 0, comments: [] });
                    return;
                }
                
                const transaction = db.transaction(['pdfStats'], 'readonly');
                const store = transaction.objectStore('pdfStats');
                const request = store.get(pdfName);
                
                request.onsuccess = function(event) {
                    if (request.result) {
                        resolve(request.result);
                    } else {
                        resolve({ pdfName: pdfName, downloads: 0, likes: 0, comments: [] });
                    }
                };
                
                request.onerror = function() {
                    resolve({ pdfName: pdfName, downloads: 0, likes: 0, comments: [] });
                };
            });
        }
        
        // Save stats for a PDF
        async function savePDFStats(stats) {
            return new Promise((resolve, reject) => {
                if (!db) {
                    reject('Database not initialized');
                    return;
                }
                
                const transaction = db.transaction(['pdfStats'], 'readwrite');
                const store = transaction.objectStore('pdfStats');
                const request = store.put(stats);
                
                request.onsuccess = function() {
                    resolve();
                };
                
                request.onerror = function() {
                    reject(request.error);
                };
            });
        }
        
        // Update download count
        async function incrementDownload(pdfName) {
            const stats = await getPDFStats(pdfName);
            stats.downloads = (stats.downloads || 0) + 1;
            await savePDFStats(stats);
            return stats.downloads;
        }
        
        // Update like count
        async function incrementLike(pdfName) {
            const stats = await getPDFStats(pdfName);
            stats.likes = (stats.likes || 0) + 1;
            await savePDFStats(stats);
            return stats.likes;
        }
        
        // Add comment
        async function addCommentToPDF(pdfName, commentText) {
            const stats = await getPDFStats(pdfName);
            if (!stats.comments) stats.comments = [];
            stats.comments.push({
                text: commentText,
                timestamp: Date.now(),
                user: 'User'
            });
            await savePDFStats(stats);
            return stats.comments;
        }
        
        // Get all stats for summary
        async function getAllStats() {
            return new Promise((resolve) => {
                if (!db) {
                    resolve({ totalDownloads: 0, totalLikes: 0, totalComments: 0 });
                    return;
                }
                
                const transaction = db.transaction(['pdfStats'], 'readonly');
                const store = transaction.objectStore('pdfStats');
                const request = store.getAll();
                
                request.onsuccess = function() {
                    const allStats = request.result || [];
                    let totalDownloads = 0;
                    let totalLikes = 0;
                    let totalComments = 0;
                    
                    allStats.forEach(stat => {
                        totalDownloads += stat.downloads || 0;
                        totalLikes += stat.likes || 0;
                        totalComments += (stat.comments || []).length;
                    });
                    
                    resolve({ totalDownloads, totalLikes, totalComments });
                };
                
                request.onerror = function() {
                    resolve({ totalDownloads: 0, totalLikes: 0, totalComments: 0 });
                };
            });
        }
        
        // Load PDFs from GitHub
        async function loadPDFs() {
            const loading = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const pdfGrid = document.getElementById('pdfGrid');
            const noResults = document.getElementById('noResults');
            
            loading.classList.add('show');
            errorDiv.classList.remove('show');
            pdfGrid.innerHTML = '';
            noResults.style.display = 'none';
            
            try {
                const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                const sortBy = document.getElementById('sortBy').value;
                
                // Fetch PDF files from GitHub
                const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${PDFS_FOLDER}`);
                
                if (!response.ok) {
                    throw new Error('Failed to load PDFs from repository');
                }
                
                const files = await response.json();
                const pdfFiles = files.filter(file => file.name.toLowerCase().endsWith('.pdf'));
                
                // Get stats for each PDF from IndexedDB
                const pdfsWithStats = await Promise.all(pdfFiles.map(async (file) => {
                    const stats = await getPDFStats(file.name);
                    return {
                        name: file.name,
                        download_url: file.download_url,
                        size: file.size,
                        downloads: stats.downloads || 0,
                        likes: stats.likes || 0,
                        comments: stats.comments || []
                    };
                }));
                
                allPDFs = pdfsWithStats;
                
                // Apply search filter
                let filteredPDFs = allPDFs;
                if (searchTerm) {
                    filteredPDFs = allPDFs.filter(pdf => 
                        pdf.name.toLowerCase().includes(searchTerm)
                    );
                }
                
                // Apply sorting
                filteredPDFs.sort((a, b) => {
                    if (sortBy === 'name') {
                        return a.name.localeCompare(b.name);
                    } else if (sortBy === 'downloads') {
                        return b.downloads - a.downloads;
                    } else if (sortBy === 'likes') {
                        return b.likes - a.likes;
                    } else if (sortBy === 'comments') {
                        return b.comments.length - a.comments.length;
                    }
                    return 0;
                });
                
                // Update stats
                document.getElementById('totalPdfs').textContent = allPDFs.length;
                const totals = await getAllStats();
                document.getElementById('totalDownloads').textContent = totals.totalDownloads;
                document.getElementById('totalLikes').textContent = totals.totalLikes;
                document.getElementById('totalComments').textContent = totals.totalComments;
                
                if (filteredPDFs.length === 0) {
                    noResults.style.display = 'block';
                } else {
                    displayPDFs(filteredPDFs);
                }
                
            } catch (error) {
                console.error('Error loading PDFs:', error);
                errorDiv.textContent = 'Error loading PDFs: ' + error.message;
                errorDiv.classList.add('show');
            } finally {
                loading.classList.remove('show');
            }
        }
        
        // Display PDFs
        function displayPDFs(pdfs) {
            const pdfGrid = document.getElementById('pdfGrid');
            pdfGrid.innerHTML = '';
            
            pdfs.forEach((pdf, index) => {
                const card = document.createElement('div');
                card.className = 'pdf-card';
                const fileSize = (pdf.size / 1024).toFixed(2);
                
                card.innerHTML = `
                    <div class="pdf-icon">
                        <i class="fas fa-file-pdf"></i>
                    </div>
                    <div class="pdf-content">
                        <div class="pdf-name">${escapeHtml(pdf.name)}</div>
                        <div class="pdf-meta">
                            <span><i class="fas fa-file"></i> PDF</span>
                            <span class="pdf-size">${fileSize} KB</span>
                        </div>
                        <div class="engagement">
                            <div class="engagement-item">
                                <div class="engagement-number">${pdf.downloads}</div>
                                <div class="engagement-label">Downloads</div>
                            </div>
                            <div class="engagement-item">
                                <div class="engagement-number">${pdf.likes}</div>
                                <div class="engagement-label">Likes</div>
                            </div>
                            <div class="engagement-item">
                                <div class="engagement-number">${pdf.comments.length}</div>
                                <div class="engagement-label">Comments</div>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button class="download-btn" onclick="downloadPDF('${escapeHtml(pdf.name)}', '${escapeHtml(pdf.download_url)}')">
                                <i class="fas fa-download"></i> Download
                            </button>
                            <button class="like-btn" onclick="likePDF('${escapeHtml(pdf.name)}', this)">
                                <i class="fas fa-heart"></i> Like
                            </button>
                        </div>
                        <div class="comments-section" id="comments-${index}">
                            ${pdf.comments.map(comment => `
                                <div class="comment">
                                    <div class="comment-user">👤 ${escapeHtml(comment.user || 'User')}</div>
                                    <div class="comment-text">${escapeHtml(comment.text)}</div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="comment-input-section">
                            <input type="text" class="comment-input" id="comment-input-${index}" placeholder="Add a comment..." maxlength="200">
                            <button class="comment-submit" onclick="addComment('${escapeHtml(pdf.name)}', ${index})">
                                Post
                            </button>
                        </div>
                    </div>
                `;
                
                pdfGrid.appendChild(card);
            });
        }
        
        // Download PDF
        async function downloadPDF(pdfName, downloadUrl) {
            try {
                await incrementDownload(pdfName);
                await updateTotalStats();
                
                const link = document.createElement('a');
                link.href = downloadUrl;
                link.download = pdfName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                loadPDFs();
            } catch (error) {
                console.error('Error downloading PDF:', error);
                alert('Error downloading PDF. Please try again.');
            }
        }
        
        // Like PDF
        async function likePDF(pdfName, button) {
            try {
                await incrementLike(pdfName);
                await updateTotalStats();
                
                button.classList.add('liked');
                setTimeout(() => {
                    button.classList.remove('liked');
                }, 300);
                
                loadPDFs();
            } catch (error) {
                console.error('Error liking PDF:', error);
            }
        }
        
        // Add comment
        async function addComment(pdfName, cardIndex) {
            const commentInput = document.getElementById(`comment-input-${cardIndex}`);
            const commentText = commentInput.value.trim();
            
            if (!commentText) {
                alert('Please enter a comment.');
                return;
            }
            
            try {
                await addCommentToPDF(pdfName, commentText);
                await updateTotalStats();
                commentInput.value = '';
                loadPDFs();
            } catch (error) {
                console.error('Error adding comment:', error);
                alert('Error adding comment. Please try again.');
            }
        }
        
        // Update total stats display
        async function updateTotalStats() {
            const totals = await getAllStats();
            document.getElementById('totalDownloads').textContent = totals.totalDownloads;
            document.getElementById('totalLikes').textContent = totals.totalLikes;
            document.getElementById('totalComments').textContent = totals.totalComments;
        }
        
        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Initialize
        async function init() {
            await initDatabase();
            await loadPDFs();
            
            // Update online count (simple counter)
            let onlineCount = localStorage.getItem('onlineCount') || 1;
            document.getElementById('onlineCount').textContent = onlineCount;
            
            // Search on enter
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    loadPDFs();
                }
            });
        }
        
        // Start the application
        init();
    </script>
</body>
</html>
