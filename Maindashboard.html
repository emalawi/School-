<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input {
            padding: 8px;
            width: 300px;
            margin-right: 10px;
        }
        button {
            padding: 8px 12px;
        }
        ul {
            margin-top: 20px;
        }
        li {
            margin: 5px 0;
        }
        a {
            text-decoration: none;
            color: blue;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>PDF Search</h1>
    <input type="text" id="searchInput" placeholder="Search PDFs">
    <button onclick="searchPDF()">Search</button>
    <ul id="pdfList"></ul>

    <script>
        const OWNER = "emalawi";
        const REPO = "School-";
        const FOLDER = "emalawi19";

        async function fetchPDFs() {
            try {
                const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FOLDER}`;
                const res = await fetch(url);
                const data = await res.json();
                // Filter only PDF files
                return data.filter(file => file.name.toLowerCase().endsWith(".pdf"));
            } catch (error) {
                console.error("Error fetching PDFs:", error);
                alert("Failed to fetch PDFs. Check console for details.");
                return [];
            }
        }

        function displayPDFs(pdfs) {
            const list = document.getElementById("pdfList");
            list.innerHTML = "";
            if (pdfs.length === 0) {
                list.innerHTML = "<li>No PDFs found</li>";
                return;
            }
            pdfs.forEach(pdf => {
                const li = document.createElement("li");
                li.innerHTML = `<a href="${pdf.download_url}" target="_blank">${pdf.name}</a>`;
                list.appendChild(li);
            });
        }

        async function searchPDF() {
            const query = document.getElementById("searchInput").value.toLowerCase();
            const pdfs = await fetchPDFs();
            const filtered = pdfs.filter(pdf => pdf.name.toLowerCase().includes(query));
            displayPDFs(filtered);
        }

        // Load all PDFs on page load
        fetchPDFs().then(displayPDFs);
    </script>
</body>
</html>
