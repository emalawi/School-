<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>emalawi19 PDF Library · Smart Search & Mobile First</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ----- MODERN RESET + ULTRA-THIN OPTIMIZATION ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --secondary: #7c3aed;
            --accent: #06b6d4;
            --bg-gradient-start: #4f46e5;
            --bg-gradient-end: #7c3aed;
            --card-bg: rgba(255, 255, 255, 0.98);
            --text-dark: #1e293b;
            --text-soft: #334155;
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.12);
            --radius-lg: 1.5rem;
            --radius-md: 1rem;
            --radius-sm: 0.75rem;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            padding: 1rem;
            margin: 0;
        }

        /* ultra-thin containers — fluid width, no horizontal overflow */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        /* header card – fully responsive */
        .header-card {
            background: var(--card-bg);
            backdrop-filter: blur(2px);
            padding: 1.5rem 1.25rem;
            border-radius: var(--radius-lg);
            text-align: center;
            margin-bottom: 1.25rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
        }

        .header-card h1 {
            font-size: 1.75rem;
            background: linear-gradient(120deg, var(--primary), var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .header-card h1 i {
            background: none;
            color: var(--primary);
            font-size: 1.8rem;
        }

        /* stats grid — adapts perfectly on small screens */
        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.25rem;
        }

        .stat-item {
            background: #f8fafc;
            padding: 0.85rem 1rem;
            border-radius: var(--radius-md);
            flex: 1;
            min-width: 110px;
            text-align: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
            border: 1px solid rgba(79, 70, 229, 0.1);
        }

        .stat-value {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        /* === POWERFUL SEARCH ENGINE WITH VISIBLE SEARCH BUTTON === */
        .search-wrapper {
            position: relative;
            margin: 1.5rem 0 0.5rem 0;
        }

        .search-container {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            width: 100%;
        }

        .search-input-group {
            position: relative;
            flex: 1;
        }

        .search-box {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-md);
            font-size: 1rem;
            outline: none;
            background: white;
            transition: all 0.25s;
            font-weight: 500;
        }

        .search-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        .search-icon-left {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1.2rem;
            pointer-events: none;
        }

        .search-button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 0 1.5rem;
            border-radius: var(--radius-md);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            white-space: nowrap;
            height: 54px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .search-button:hover {
            transform: scale(0.98);
            background: linear-gradient(135deg, var(--primary-dark), #6d28d9);
        }

        .search-button i {
            font-size: 1.1rem;
        }

        .search-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #475569;
            margin-top: 0.7rem;
            padding: 0 0.25rem;
        }

        .clear-search {
            background: none;
            border: none;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* PDF grid — truly fluid */
        .pdf-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.25rem;
        }

        /* card design – thumb-friendly */
        .pdf-card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 1.25rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
            word-break: break-word;
        }

        .pdf-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .pdf-name {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .pdf-name i {
            color: #ef4444;
            font-size: 1.1rem;
        }

        /* highlight search matches */
        .highlight {
            background-color: #fef08a;
            color: #1e1b2f;
            font-weight: 600;
            border-radius: 4px;
            padding: 0 2px;
        }

        .meta-stats {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-soft);
            margin: 0.5rem 0;
            background: #f1f5f9;
            padding: 0.4rem 0.7rem;
            border-radius: 2rem;
            width: fit-content;
        }

        .action-btns {
            display: flex;
            gap: 0.75rem;
            margin: 1rem 0 0.8rem;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 0.7rem 0.5rem;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-dl {
            background: #10b981;
            color: white;
        }

        .btn-dl:hover {
            background: #059669;
            transform: scale(0.98);
        }

        .btn-like {
            background: #ef4444;
            color: white;
        }

        .btn-like:hover {
            background: #dc2626;
        }

        /* comment section — touch friendly */
        .comment-section {
            margin-top: 1rem;
            border-top: 1px solid #eef2ff;
            padding-top: 0.8rem;
        }

        .comment-display {
            max-height: 100px;
            overflow-y: auto;
            font-size: 0.8rem;
            color: #334155;
            background: #fafcff;
            padding: 0.6rem;
            margin-bottom: 0.7rem;
            border-radius: var(--radius-sm);
            border: 1px solid #eef2ff;
        }

        .comment-display div {
            padding: 0.2rem 0;
            border-bottom: 1px dashed #e2e8f0;
            word-break: break-word;
        }

        .comment-input-group {
            display: flex;
            gap: 0.6rem;
        }

        .comment-input {
            flex: 1;
            padding: 0.7rem;
            border: 1px solid #cbd5e1;
            border-radius: 2rem;
            font-size: 0.85rem;
            background: white;
        }

        .btn-comm {
            background: var(--primary);
            color: white;
            width: auto;
            padding: 0 1rem;
            border-radius: 2rem;
        }

        /* loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 1rem;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-results {
            background: white;
            padding: 2rem;
            text-align: center;
            border-radius: var(--radius-md);
            color: #475569;
            font-weight: 500;
        }

        /* extra tiny tune */
        @media (min-width: 500px) {
            .pdf-grid {
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            }
            body {
                padding: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .search-container {
                flex-direction: column;
                gap: 0.6rem;
            }
            .search-button {
                width: 100%;
                justify-content: center;
                height: 48px;
            }
            .action-btns button {
                font-size: 0.75rem;
                padding: 0.6rem 0.3rem;
            }
            .stat-value {
                font-size: 1.3rem;
            }
            .header-card h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">
    <div class="spinner"></div>
    <div style="color: white; font-weight: 500;">Updating library...</div>
</div>

<div class="container">
    <div class="header-card">
        <h1><i class="fas fa-book-open"></i> emalawi19 <span style="background: none;">PDF Vault</span></h1>
        <div class="stats-grid">
            <div class="stat-item"><div class="stat-value" id="totalLikes">0</div><div><i class="fas fa-heart"></i> Total Likes</div></div>
            <div class="stat-item"><div class="stat-value" id="totalDownloads">0</div><div><i class="fas fa-download"></i> Downloads</div></div>
        </div>
        
        <!-- POWERFUL SEARCH ENGINE WITH VISIBLE SEARCH BUTTON -->
        <div class="search-wrapper">
            <div class="search-container">
                <div class="search-input-group">
                    <i class="fas fa-search search-icon-left"></i>
                    <input type="text" id="searchInput" class="search-box" placeholder="Search by filename, topic, or keyword...">
                </div>
                <button id="searchButton" class="search-button"><i class="fas fa-search"></i> <span>Search</span></button>
            </div>
            <div class="search-stats">
                <span id="resultCount">0 documents</span>
                <button id="clearSearchBtn" class="clear-search"><i class="fas fa-times-circle"></i> clear filters</button>
            </div>
        </div>
    </div>

    <div id="pdfGrid" class="pdf-grid"></div>
</div>

<script>
    // ======================= CONFIGURATION =======================
    const API_URL = 'https://script.google.com/macros/s/AKfycbzkIXlNhjp7EUYD1ukjn9laQlzw4SRVdWXBfyqSnaAjfY0v11VxpoiRu9A5F_V_cI2GQw/exec';
    const GITHUB_USERNAME = 'emalawi'; 
    const REPO_NAME = 'School-';
    const FOLDER_PATH = 'emalawi19';

    let masterLibrary = [];      // full dataset
    let filteredLibrary = [];    // after search

    // Helper: update result count display
    function updateResultStats() {
        const countSpan = document.getElementById('resultCount');
        if (countSpan) {
            const showing = filteredLibrary.length;
            const total = masterLibrary.length;
            countSpan.innerHTML = showing === total ? `${total} document${total !== 1 ? 's' : ''}` : `${showing} of ${total} results`;
        }
    }

    // powerful search & highlight engine (case-insensitive, multi-word)
    function performSmartSearch(query) {
        if (!query.trim()) {
            filteredLibrary = [...masterLibrary];
            renderFilteredUI();
            updateResultStats();
            return;
        }
        
        const lowerQuery = query.trim().toLowerCase();
        // split words for partial matching (more powerful)
        const words = lowerQuery.split(/\s+/).filter(w => w.length > 0);
        
        filteredLibrary = masterLibrary.filter(pdf => {
            const fileName = pdf.name.toLowerCase();
            // match if ANY word exists inside filename (powerful substring)
            return words.some(word => fileName.includes(word));
        });
        
        renderFilteredUI();
        updateResultStats();
    }
    
    // render with dynamic keyword highlighting
    function renderFilteredUI() {
        const grid = document.getElementById('pdfGrid');
        if (!grid) return;
        
        const searchTerm = document.getElementById('searchInput')?.value.trim() || '';
        
        if (filteredLibrary.length === 0) {
            grid.innerHTML = `<div class="no-results"><i class="fas fa-folder-open" style="font-size: 2rem; opacity: 0.6;"></i><p>No PDFs match “${escapeHtml(searchTerm)}”</p><small>Try different keywords</small></div>`;
            return;
        }
        
        grid.innerHTML = '';
        
        filteredLibrary.forEach((pdf, idx) => {
            // get original index for comment mapping (keep stable id)
            const originalIndex = masterLibrary.findIndex(p => p.name === pdf.name);
            
            // Highlighted filename engine
            let displayName = pdf.name;
            if (searchTerm) {
                const escapedTerm = searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp(`(${escapedTerm.split(/\s+/).join('|')})`, 'gi');
                displayName = pdf.name.replace(regex, match => `<span class="highlight">${escapeHtml(match)}</span>`);
            } else {
                displayName = escapeHtml(pdf.name);
            }
            
            const commentHtml = pdf.comments && pdf.comments.length 
                ? pdf.comments.map(c => `<div><i class="fas fa-comment-dots" style="font-size:0.7rem; color:#4f46e5;"></i> ${escapeHtml(c)}</div>`).join('')
                : '<div style="color:#94a3b8;"><i class="far fa-comment"></i> No comments yet</div>';
            
            const card = document.createElement('div');
            card.className = 'pdf-card';
            card.setAttribute('data-filename', pdf.name.toLowerCase());
            card.innerHTML = `
                <div class="pdf-name">
                    <i class="fas fa-file-pdf"></i> 
                    <span style="flex:1;">${displayName}</span>
                </div>
                <div class="meta-stats">
                    <span><i class="fas fa-heart" style="color:#ef4444;"></i> ${pdf.likes}</span>
                    <span><i class="fas fa-download" style="color:#10b981;"></i> ${pdf.downloads}</span>
                </div>
                <div class="action-btns">
                    <button class="btn-like" data-pdfname="${escapeAttr(pdf.name)}" data-action="like"><i class="fas fa-thumbs-up"></i> Like</button>
                    <button class="btn-dl" data-pdfname="${escapeAttr(pdf.name)}" data-url="${escapeAttr(pdf.url)}" data-action="download"><i class="fas fa-download"></i> Download</button>
                </div>
                <div class="comment-section">
                    <div class="comment-display" id="commentBox-${originalIndex}">${commentHtml}</div>
                    <div class="comment-input-group">
                        <input type="text" id="commentInput-${originalIndex}" class="comment-input" placeholder="Write a comment... 📝" maxlength="200">
                        <button class="btn-comm" data-idx="${originalIndex}" data-pdfname="${escapeAttr(pdf.name)}"><i class="fas fa-paper-plane"></i> Post</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
        
        // reattach event listeners dynamically (efficient)
        attachDynamicEvents();
    }
    
    function attachDynamicEvents() {
        // Like & Download buttons
        document.querySelectorAll('.btn-like, .btn-dl').forEach(btn => {
            btn.removeEventListener('click', handleActionClick);
            btn.addEventListener('click', handleActionClick);
        });
        // Comment buttons
        document.querySelectorAll('.btn-comm').forEach(btn => {
            btn.removeEventListener('click', handleCommentClick);
            btn.addEventListener('click', handleCommentClick);
        });
    }
    
    async function handleActionClick(e) {
        e.stopPropagation();
        const btn = e.currentTarget;
        const action = btn.classList.contains('btn-like') ? 'like' : 'download';
        const pdfName = btn.getAttribute('data-pdfname');
        const url = btn.getAttribute('data-url');
        
        if (action === 'download' && url) {
            window.open(url, '_blank');
        }
        
        await sendInteraction(pdfName, action);
    }
    
    async function handleCommentClick(e) {
        const btn = e.currentTarget;
        const pdfName = btn.getAttribute('data-pdfname');
        const idx = parseInt(btn.getAttribute('data-idx'));
        const inputField = document.getElementById(`commentInput-${idx}`);
        if (!inputField) return;
        const commentText = inputField.value.trim();
        if (commentText === "") {
            inputField.style.border = "1px solid #f97316";
            setTimeout(() => { inputField.style.border = ""; }, 800);
            return;
        }
        await sendInteraction(pdfName, 'comment', commentText);
        inputField.value = "";
    }
    
    async function sendInteraction(pdfName, action, commentText = null) {
        const loader = document.getElementById('loader');
        loader.style.display = 'flex';
        
        let payload = { pdfName, action };
        if (action === 'comment' && commentText) {
            payload.comment = commentText;
        }
        
        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
        } catch (err) {
            console.warn("network glitch, but we proceed refresh");
        }
        
        // delay to let google script update
        setTimeout(async () => {
            await refreshLibraryData();
            loader.style.display = 'none';
        }, 1300);
    }
    
    // fetch from GitHub + Google Sheets (merge)
    async function refreshLibraryData() {
        try {
            // 1) fetch github pdf listing
            const ghResponse = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${FOLDER_PATH}`);
            if (!ghResponse.ok) throw new Error('GitHub fetch failed');
            const files = await ghResponse.json();
            const pdfFiles = files.filter(f => f.name && f.name.toLowerCase().endsWith('.pdf'));
            
            // 2) fetch stats from google sheets
            let sheetStats = [];
            try {
                const sheetRes = await fetch(API_URL);
                sheetStats = await sheetRes.json();
            } catch(e) { console.warn("sheet fetch fallback", e); }
            
            // ensure array
            if (!Array.isArray(sheetStats)) sheetStats = [];
            
            const merged = pdfFiles.map(file => {
                const stat = sheetStats.find(s => s && s.pdfName === file.name) || { likes: 0, downloads: 0, comments: "" };
                let commentsArray = [];
                if (stat.comments && typeof stat.comments === 'string') {
                    commentsArray = stat.comments.split(' | ').filter(c => c.trim() !== "");
                } else if (Array.isArray(stat.comments)) {
                    commentsArray = stat.comments;
                }
                return {
                    name: file.name,
                    url: file.download_url,
                    likes: typeof stat.likes === 'number' ? stat.likes : 0,
                    downloads: typeof stat.downloads === 'number' ? stat.downloads : 0,
                    comments: commentsArray
                };
            });
            
            masterLibrary = merged;
            // reapply current search filter after refresh (preserve input value)
            const currentQuery = document.getElementById('searchInput')?.value || "";
            performSmartSearch(currentQuery);
            updateGlobalStats();
        } catch (err) {
            console.error("Load error:", err);
            document.getElementById('pdfGrid').innerHTML = `<div class="no-results"><i class="fas fa-exclamation-triangle"></i> Failed to load library.<br> Check GitHub settings & CORS. Make sure repo ${REPO_NAME} / ${FOLDER_PATH} exists.</div>`;
        }
    }
    
    function updateGlobalStats() {
        let totalLikes = 0, totalDownloads = 0;
        masterLibrary.forEach(pdf => {
            totalLikes += pdf.likes;
            totalDownloads += pdf.downloads;
        });
        document.getElementById('totalLikes').innerText = totalLikes;
        document.getElementById('totalDownloads').innerText = totalDownloads;
    }
    
    // setup search with both button click AND input (optional realtime but button is primary)
    function setupSearchEvents() {
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchButton');
        const clearBtn = document.getElementById('clearSearchBtn');
        
        // SEARCH BUTTON: main trigger
        searchBtn.addEventListener('click', () => {
            performSmartSearch(searchInput.value);
        });
        
        // Also allow Enter key from keyboard (good UX)
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                performSmartSearch(searchInput.value);
            }
        });
        
        // Clear button resets everything
        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            performSmartSearch('');
            searchInput.focus();
        });
    }
    
    // utility: escape html to avoid injection
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    
    function escapeAttr(str) {
        if (!str) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    
    // initial load
    window.onload = async () => {
        const loader = document.getElementById('loader');
        loader.style.display = 'flex';
        await refreshLibraryData();
        setupSearchEvents();
        loader.style.display = 'none';
    };
</script>
</body>
</html>
