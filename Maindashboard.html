<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>emalawi19 PDF Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; text-align: center; }
        .search-input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
        .pdf-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .pdf-name { font-weight: bold; font-size: 1.2em; display: block; margin-bottom: 5px; }
        .stats { color: #5f6368; font-size: 0.9em; margin-bottom: 10px; }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .btn-like { background: #feeef0; color: #d93025; }
        .btn-download { background: #e6f4ea; color: #1e8e3e; }
        .btn-comment { background: #e8f0fe; color: #1a73e8; }
        button:hover { opacity: 0.8; }
        .comment-box { margin-top: 10px; display: flex; gap: 5px; }
        .comment-input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>

<div class="card">
    <h1>emalawi19 PDF Library</h1>
    <input type="text" id="search" class="search-input" placeholder="Search for a PDF..." onkeyup="filterPDFs()">

    <div id="pdf-container">
        <div class="pdf-item" data-name="Manual_2026.pdf">
            <span class="pdf-name">Manual_2026.pdf</span>
            <div class="stats" id="stats-Manual_2026.pdf">Loading stats...</div>
            <div class="actions">
                <button class="btn-like" onclick="sendAction('Manual_2026.pdf', 'like')">❤️ Like</button>
                <button class="btn-download" onclick="sendAction('Manual_2026.pdf', 'download', 'https://your-hosting.com/emalawi19/Manual_2026.pdf')">📥 Download</button>
            </div>
            <div class="comment-box">
                <input type="text" id="input-Manual_2026.pdf" class="comment-input" placeholder="Add a comment...">
                <button class="btn-comment" onclick="postComment('Manual_2026.pdf')">Post</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzkIXlNhjp7EUYD1ukjn9laQlzw4SRVdWXBfyqSnaAjfY0v11VxpoiRu9A5F_V_cI2GQw/exec';

    // 1. Load data from Google Sheets
    async function loadData() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            data.forEach(item => {
                const el = document.getElementById(`stats-${item.pdfName}`);
                if (el) el.innerText = `Likes: ${item.likes} | Downloads: ${item.downloads}`;
            });
        } catch (e) { console.log("Waiting for data..."); }
    }

    // 2. Send Like/Download
    async function sendAction(pdfName, action, downloadUrl = null) {
        if (action === 'download' && downloadUrl) window.open(downloadUrl, '_blank');

        await fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ pdfName, action })
        });
        
        alert(action + " recorded!");
        setTimeout(loadData, 1500); // Refresh stats
    }

    // 3. Send Comment
    async function postComment(pdfName) {
        const input = document.getElementById(`input-${pdfName}`);
        if (!input.value) return;

        await fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ pdfName, action: 'comment', comment: input.value })
        });

        input.value = '';
        alert("Comment posted!");
    }

    // 4. Search Filter
    function filterPDFs() {
        const query = document.getElementById('search').value.toLowerCase();
        const items = document.querySelectorAll('.pdf-item');
        items.forEach(item => {
            const name = item.getAttribute('data-name').toLowerCase();
            item.style.display = name.includes(query) ? "block" : "none";
        });
    }

    window.onload = loadData;
</script>

</body>
</html>
