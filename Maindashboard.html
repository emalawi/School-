<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>emalawi19 PDF Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 30px auto; padding: 20px; background: #eef2f3; color: #333; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .search-box { width: 100%; padding: 12px; margin-bottom: 25px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .pdf-item { border-bottom: 1px solid #eee; padding: 20px 0; display: flex; flex-direction: column; }
        .pdf-header { display: flex; justify-content: space-between; align-items: center; }
        .pdf-name { font-weight: bold; font-size: 1.1em; color: #007bff; }
        .stats { font-size: 0.85em; color: #7f8c8d; margin: 8px 0; }
        .actions { margin-top: 10px; }
        button { cursor: pointer; padding: 8px 15px; margin-right: 8px; border: none; border-radius: 5px; transition: 0.3s; font-weight: 500; }
        .btn-like { background: #e74c3c; color: white; }
        .btn-download { background: #27ae60; color: white; }
        .btn-comment { background: #34495e; color: white; }
        button:hover { opacity: 0.8; }
        .comment-section { margin-top: 10px; display: flex; gap: 5px; }
        .comment-input { flex-grow: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>emalawi19 Library</h1>
    
    <input type="text" id="searchInput" class="search-box" placeholder="Search by PDF name..." onkeyup="filterPDFs()">

    <div id="pdfList">
        <div class="pdf-item" data-name="Lesson_Plan_Sample.pdf">
            <div class="pdf-header">
                <span class="pdf-name">Lesson_Plan_Sample.pdf</span>
                <div class="stats" id="stats-Lesson_Plan_Sample.pdf">Likes: 0 | Downloads: 0</div>
            </div>
            <div class="actions">
                <button class="btn-like" onclick="handleAction('Lesson_Plan_Sample.pdf', 'like')">❤️ Like</button>
                <button class="btn-download" onclick="handleAction('Lesson_Plan_Sample.pdf', 'download', 'https://yourserver.com/emalawi19/Lesson_Plan_Sample.pdf')">📥 Download</button>
            </div>
            <div class="comment-section">
                <input type="text" id="comment-Lesson_Plan_Sample.pdf" class="comment-input" placeholder="Write a comment...">
                <button class="btn-comment" onclick="submitComment('Lesson_Plan_Sample.pdf')">Post</button>
            </div>
        </div>
        </div>
</div>

<script>
    // YOUR API URL
    const API_URL = 'https://script.google.com/macros/s/AKfycbxY5UNfAufVGd5n75fSzLLAO9Yi6dQH93Gsgddrm37tqhCHHkux2pCnBMMK_uRxKIVyVg/exec';

    // Fetch initial data from Sheet
    async function loadStats() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            data.forEach(item => {
                const statsDiv = document.getElementById(`stats-${item.pdfName}`);
                if (statsDiv) {
                    statsDiv.innerText = `Likes: ${item.likes} | Downloads: ${item.downloads}`;
                }
            });
        } catch (e) { console.log("Stats loading..."); }
    }

    // Handle Likes and Downloads
    async function handleAction(pdfName, action, downloadUrl = null) {
        if (action === 'download' && downloadUrl) {
            window.open(downloadUrl, '_blank');
        }

        // Send data to Google Sheets
        fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ pdfName, action })
        });
        
        alert(action.charAt(0).toUpperCase() + action.slice(1) + " registered!");
        setTimeout(loadStats, 2000); // Reload stats after a short delay
    }

    // Handle Comments
    async function submitComment(pdfName) {
        const input = document.getElementById(`comment-${pdfName}`);
        const comment = input.value;
        if (!comment) return;

        fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ pdfName, action: 'comment', comment: comment })
        });

        input.value = '';
        alert("Comment sent!");
    }

    // Search function
    function filterPDFs() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let items = document.getElementsByClassName('pdf-item');
        for (let i = 0; i < items.length; i++) {
            let name = items[i].getAttribute('data-name').toLowerCase();
            items[i].style.display = name.includes(input) ? "block" : "none";
        }
    }

    window.onload = loadStats;
</script>

</body>
</html>
