<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Library - Search & Download</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #4CAF50;
            --danger: #f44336;
            --warning: #ff9800;
            --light: #f8f9fa;
            --dark: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            background: white;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        .header-banner {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 80px;
            position: relative;
        }

        .header-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(102, 126, 234, 0.7);
            border-radius: 10px;
        }

        .header-banner-content {
            position: relative;
            z-index: 2;
        }

        h1 {
            color: var(--dark);
            margin: 20px 0 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .online-counter {
            background: white;
            padding: 15px 25px;
            border-radius: 25px;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .online-counter-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            background: #4CAF50;
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .online-count {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
        }

        .online-label {
            font-size: 14px;
            color: #666;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .search-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input[type="text"], select {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            color: var(--primary);
            font-weight: 600;
            display: none;
            margin: 40px 0;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 4px solid rgba(102, 126, 234, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #c33;
        }

        .error.show {
            display: block;
        }

        .pdf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .pdf-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        .pdf-card:hover {
            transform: translateY(-10px);
        }

        .pdf-icon {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
        }

        .pdf-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .pdf-name {
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 10px;
            font-size: 16px;
            word-break: break-word;
        }

        .pdf-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #999;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .pdf-size {
            background: var(--light);
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .engagement {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .engagement-item {
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            background: var(--light);
        }

        .engagement-number {
            font-weight: bold;
            color: var(--primary);
            font-size: 16px;
        }

        .engagement-label {
            font-size: 11px;
            color: #666;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .download-btn, .like-btn {
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .download-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
        }

        .like-btn {
            background: white;
            border: 2px solid #e0e0e0;
            color: var(--dark);
        }

        .like-btn:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .like-btn.liked {
            background: #ffe0e0;
            border-color: var(--danger);
            color: var(--danger);
        }

        .comments-section {
            background: var(--light);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .comment {
            background: white;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 12px;
            border-left: 3px solid var(--primary);
        }

        .comment-user {
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .comment-text {
            color: #333;
            word-break: break-word;
        }

        .comment-input-section {
            display: flex;
            gap: 8px;
        }

        .comment-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 12px;
        }

        .comment-submit {
            padding: 8px 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .no-results {
            text-align: center;
            color: #999;
            padding: 60px 20px;
            font-size: 18px;
            display: none;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2em; }
            .pdf-grid { grid-template-columns: 1fr; }
            .search-box { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-banner">
            <div class="header-banner-content">📚</div>
        </div>
        <h1>📖 PDF Library Hub</h1>
        <p class="subtitle">Search, Download & Share Educational Resources</p>
        
        <div class="online-counter">
            <div class="online-counter-content">
                <div class="online-dot"></div>
                <div>
                    <div class="online-count" id="onlineCount">1</div>
                    <div class="online-label">Active Users</div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-number" id="totalPdfs">0</div>
                <div class="stat-label">Total PDFs</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalDownloads">0</div>
                <div class="stat-label">Total Downloads</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalLikes">0</div>
                <div class="stat-label">Total Likes</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalComments">0</div>
                <div class="stat-label">Total Comments</div>
            </div>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search PDFs by name or subject..." autocomplete="off">
                <select id="sortBy">
                    <option value="name">Sort by Name</option>
                    <option value="downloads">Most Downloaded</option>
                    <option value="likes">Most Liked</option>
                    <option value="comments">Most Commented</option>
                </select>
                <button onclick="loadPDFs()">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
        </div>

        <div class="loading" id="loading">
            <span class="spinner"></span> Loading PDFs...
        </div>
        <div class="error" id="error"></div>
        <div class="pdf-grid" id="pdfGrid"></div>
        <div class="no-results" id="noResults">
            <div>📭 No PDFs found. Try a different search.</div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        const GITHUB_OWNER = 'emalawi';
        const GITHUB_REPO = 'School-';
        const PDFS_FOLDER = 'emalawi19';
        
        // YOUR NEW GOOGLE APPS SCRIPT URL
        const GOOGLE_SCRIPT_API = 'https://script.google.com/macros/s/AKfycbwtEzM-YbtdJ38EQ88H1XXa7ok6Vqvz-3T1XlQqmdKaVt3M59R8ojayZB0losPc4zpr7A/exec';
        
        let allPDFs = [];
        let pdfStatsCache = {};
        
        // ==================== API CALLS ====================
        async function callAPI(action, params = {}) {
            try {
                let url = `${GOOGLE_SCRIPT_API}?action=${action}`;
                for (const key in params) {
                    url += `&${key}=${encodeURIComponent(params[key])}`;
                }
                console.log('Calling API:', url);
                const response = await fetch(url);
                const data = await response.json();
                console.log('API Response:', data);
                return data;
            } catch (error) {
                console.error('API Error:', error);
                return null;
            }
        }
        
        // ==================== PDF STATS ====================
        async function loadAllPDFStats() {
            try {
                const data = await callAPI('getAll');
                if (data && Array.isArray(data)) {
                    pdfStatsCache = {};
                    for (const row of data) {
                        // Only process rows that have pdfName and NO Username (PDF stats rows)
                        if (row.pdfName && row.pdfName !== '' && (!row.Username || row.Username === '')) {
                            let comments = [];
                            try {
                                comments = JSON.parse(row.Comments || '[]');
                            } catch(e) {
                                comments = [];
                            }
                            pdfStatsCache[row.pdfName] = {
                                downloads: parseInt(row.Downloads) || 0,
                                likes: parseInt(row.Likes) || 0,
                                comments: comments
                            };
                        }
                    }
                    console.log('Loaded PDF stats:', pdfStatsCache);
                }
                return pdfStatsCache;
            } catch (error) {
                console.error('Error loading stats:', error);
                return {};
            }
        }
        
        function getPDFStats(pdfName) {
            return pdfStatsCache[pdfName] || { downloads: 0, likes: 0, comments: [] };
        }
        
        async function savePDFStats(pdfName, stats) {
            await callAPI('updateStats', {
                pdfName: pdfName,
                downloads: stats.downloads,
                likes: stats.likes,
                comments: JSON.stringify(stats.comments)
            });
            pdfStatsCache[pdfName] = stats;
        }
        
        async function incrementDownload(pdfName) {
            const stats = getPDFStats(pdfName);
            stats.downloads++;
            await savePDFStats(pdfName, stats);
            console.log(`Download: ${pdfName} now has ${stats.downloads} downloads`);
        }
        
        async function incrementLike(pdfName) {
            const stats = getPDFStats(pdfName);
            stats.likes++;
            await savePDFStats(pdfName, stats);
            console.log(`Like: ${pdfName} now has ${stats.likes} likes`);
        }
        
        async function addCommentToPDF(pdfName, commentText, userName) {
            const stats = getPDFStats(pdfName);
            if (!stats.comments) stats.comments = [];
            stats.comments.push({ 
                text: commentText, 
                timestamp: Date.now(), 
                user: userName 
            });
            await savePDFStats(pdfName, stats);
            console.log(`Comment added to ${pdfName}`);
        }
        
        function getTotals() {
            let totalDownloads = 0, totalLikes = 0, totalComments = 0;
            Object.values(pdfStatsCache).forEach(s => {
                totalDownloads += s.downloads;
                totalLikes += s.likes;
                totalComments += (s.comments || []).length;
            });
            return { totalDownloads, totalLikes, totalComments };
        }
        
        // ==================== LOAD PDFS FROM GITHUB ====================
        async function loadPDFs() {
            const loading = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const pdfGrid = document.getElementById('pdfGrid');
            const noResults = document.getElementById('noResults');
            
            loading.classList.add('show');
            errorDiv.classList.remove('show');
            pdfGrid.innerHTML = '';
            noResults.style.display = 'none';
            
            try {
                // Load stats from Google Sheets
                await loadAllPDFStats();
                
                const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                const sortBy = document.getElementById('sortBy').value;
                
                // Fetch PDF files from GitHub
                const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${PDFS_FOLDER}`);
                
                if (!response.ok) {
                    throw new Error('Failed to load PDFs from repository');
                }
                
                const files = await response.json();
                const pdfFiles = files.filter(file => file.name.toLowerCase().endsWith('.pdf'));
                
                // Combine PDF files with stats
                const pdfsWithStats = pdfFiles.map(file => {
                    const stats = getPDFStats(file.name);
                    return {
                        name: file.name,
                        download_url: file.download_url,
                        size: file.size,
                        downloads: stats.downloads,
                        likes: stats.likes,
                        comments: stats.comments || []
                    };
                });
                
                allPDFs = pdfsWithStats;
                
                // Apply search filter
                let filteredPDFs = allPDFs;
                if (searchTerm) {
                    filteredPDFs = allPDFs.filter(pdf => 
                        pdf.name.toLowerCase().includes(searchTerm)
                    );
                }
                
                // Apply sorting
                filteredPDFs.sort((a, b) => {
                    if (sortBy === 'name') return a.name.localeCompare(b.name);
                    if (sortBy === 'downloads') return b.downloads - a.downloads;
                    if (sortBy === 'likes') return b.likes - a.likes;
                    if (sortBy === 'comments') return b.comments.length - a.comments.length;
                    return 0;
                });
                
                // Update stats display
                document.getElementById('totalPdfs').textContent = allPDFs.length;
                const totals = getTotals();
                document.getElementById('totalDownloads').textContent = totals.totalDownloads;
                document.getElementById('totalLikes').textContent = totals.totalLikes;
                document.getElementById('totalComments').textContent = totals.totalComments;
                
                if (filteredPDFs.length === 0) {
                    noResults.style.display = 'block';
                } else {
                    displayPDFs(filteredPDFs);
                }
                
            } catch (error) {
                console.error('Error:', error);
                errorDiv.textContent = 'Error loading PDFs: ' + error.message;
                errorDiv.classList.add('show');
            } finally {
                loading.classList.remove('show');
            }
        }
        
        function getCurrentUser() {
            return localStorage.getItem('loggedInUser') || 'Guest';
        }
        
        function displayPDFs(pdfs) {
            const pdfGrid = document.getElementById('pdfGrid');
            pdfGrid.innerHTML = '';
            
            pdfs.forEach((pdf, index) => {
                const card = document.createElement('div');
                card.className = 'pdf-card';
                const fileSize = (pdf.size / 1024).toFixed(2);
                const currentUser = getCurrentUser();
                
                card.innerHTML = `
                    <div class="pdf-icon">
                        <i class="fas fa-file-pdf"></i>
                    </div>
                    <div class="pdf-content">
                        <div class="pdf-name">${escapeHtml(pdf.name)}</div>
                        <div class="pdf-meta">
                            <span><i class="fas fa-file"></i> PDF</span>
                            <span class="pdf-size">${fileSize} KB</span>
                        </div>
                        <div class="engagement">
                            <div class="engagement-item">
                                <div class="engagement-number">${pdf.downloads}</div>
                                <div class="engagement-label">Downloads</div>
                            </div>
                            <div class="engagement-item">
                                <div class="engagement-number">${pdf.likes}</div>
                                <div class="engagement-label">Likes</div>
                            </div>
                            <div class="engagement-item">
                                <div class="engagement-number">${pdf.comments.length}</div>
                                <div class="engagement-label">Comments</div>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button class="download-btn" onclick="downloadPDF('${escapeHtml(pdf.name)}', '${escapeHtml(pdf.download_url)}')">
                                <i class="fas fa-download"></i> Download
                            </button>
                            <button class="like-btn" onclick="likePDF('${escapeHtml(pdf.name)}', this)">
                                <i class="fas fa-heart"></i> Like
                            </button>
                        </div>
                        <div class="comments-section" id="comments-${index}">
                            ${pdf.comments.map(comment => `
                                <div class="comment">
                                    <div class="comment-user">👤 ${escapeHtml(comment.user || 'User')}</div>
                                    <div class="comment-text">${escapeHtml(comment.text)}</div>
                                    <div style="font-size: 10px; color: #999;">${new Date(comment.timestamp).toLocaleString()}</div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="comment-input-section">
                            <input type="text" class="comment-input" id="comment-input-${index}" placeholder="Add a comment as ${currentUser}..." maxlength="200">
                            <button class="comment-submit" onclick="addComment('${escapeHtml(pdf.name)}', ${index})">
                                Post
                            </button>
                        </div>
                    </div>
                `;
                
                pdfGrid.appendChild(card);
            });
        }
        
        async function downloadPDF(pdfName, downloadUrl) {
            try {
                await incrementDownload(pdfName);
                
                const link = document.createElement('a');
                link.href = downloadUrl;
                link.download = pdfName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                await loadPDFs();
            } catch (error) {
                console.error('Error downloading:', error);
                alert('Error downloading PDF. Please try again.');
            }
        }
        
        async function likePDF(pdfName, button) {
            try {
                await incrementLike(pdfName);
                
                button.classList.add('liked');
                setTimeout(() => {
                    button.classList.remove('liked');
                }, 300);
                
                await loadPDFs();
            } catch (error) {
                console.error('Error liking:', error);
            }
        }
        
        async function addComment(pdfName, cardIndex) {
            const commentInput = document.getElementById(`comment-input-${cardIndex}`);
            const commentText = commentInput.value.trim();
            const currentUser = getCurrentUser();
            
            if (!commentText) {
                alert('Please enter a comment.');
                return;
            }
            
            try {
                await addCommentToPDF(pdfName, commentText, currentUser);
                commentInput.value = '';
                await loadPDFs();
            } catch (error) {
                console.error('Error adding comment:', error);
                alert('Error adding comment. Please try again.');
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ==================== INITIALIZATION ====================
        async function init() {
            console.log('Initializing PDF Library...');
            await loadPDFs();
            
            // Update online count
            let onlineCount = localStorage.getItem('onlineCount') || 1;
            document.getElementById('onlineCount').textContent = onlineCount;
            
            // Search on enter
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    loadPDFs();
                }
            });
            
            console.log('Ready! Using Google Apps Script API');
        }
        
        // Start the application
        init();
    </script>
</body>
</html>
